<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetMindPro Premium</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0b0b0f;
color:white;
padding-bottom:90px;
}

header{
padding:20px;
background:linear-gradient(90deg,#101522,#1d2b64,#0f2027);
font-size:28px;
font-weight:bold;
text-align:center;
letter-spacing:1px;
box-shadow:0 4px 20px rgba(0,0,0,.4);
}

.topbox{
padding:15px;
display:flex;
gap:10px;
overflow:auto;
}

.stat{
min-width:150px;
background:#151a28;
padding:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,255,150,.1);
}

.stat h3{
font-size:14px;
color:#aaa;
margin-bottom:8px;
}

.stat p{
font-size:22px;
font-weight:bold;
color:#00ff99;
}

.section{
padding:15px;
font-size:20px;
font-weight:bold;
}

.card{
background:#141822;
margin:12px;
padding:18px;
border-radius:18px;
box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.match{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:18px;
font-weight:bold;
}

.prediction{
padding:10px;
background:#0f2a1f;
border-radius:10px;
color:#00ff99;
font-weight:bold;
margin-top:10px;
text-align:center;
}

.small{
color:#bbb;
font-size:13px;
margin-top:8px;
}

.vip{
margin:20px;
padding:20px;
border-radius:20px;
background:linear-gradient(90deg,#ff9900,#ff0055);
text-align:center;
font-weight:bold;
font-size:22px;
box-shadow:0 0 20px rgba(255,0,90,.3);
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:white;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #222;
}

nav div{
color:#aaa;
font-size:14px;
text-align:center;
}

.active{
color:#00ff99;
font-weight:bold;
}
</style>
</head>
<body>

<header>BetMindPro</header>

<div class="topbox">
<div class="stat">
<h3>Today's Accuracy</h3>
<p>92%</p>
</div>

<div class="stat">
<h3>VIP Wins</h3>
<p>14/16</p>
</div>

<div class="stat">
<h3>Live Matches</h3>
<p>27</p>
</div>
</div>

<div class="section">AI Premium Predictions</div>

<div class="card">
<div class="match">
<span>Arsenal</span>
<span>vs</span>
<span>Chelsea</span>
</div>
<div class="prediction">Over 2.5 Goals 🔥</div>
<div class="small">Confidence: 94%</div>
</div>

<div class="card">
<div class="match">
<span>Barcelona</span>
<span>vs</span>
<span>Valencia</span>
</div>
<div class="prediction">Barcelona Win ✅</div>
<div class="small">Confidence: 89%</div>
</div>

<div class="card">
<div class="match">
<span>PSG</span>
<span>vs</span>
<span>Lyon</span>
</div>
<div class="prediction">BTTS Yes ⚡</div>
<div class="small">Confidence: 91%</div>
</div>

<div class="vip">
VIP ACCESS ₦2,000 / Week
<br>
<button>Unlock VIP</button>
</div>

<nav>
<div class="active">Home</div>
<div>Live</div>
<div>VIP</div>
<div>Profile</div>
</nav>

</body>
</html>
