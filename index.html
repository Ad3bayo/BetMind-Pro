<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BetMindPro Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{
background:#070b14;
color:#fff;
padding-bottom:80px;
}
header{
padding:18px;
font-size:28px;
font-weight:900;
text-align:center;
background:linear-gradient(90deg,#00ff99,#00c853);
color:#04120a;
}
.wrap{padding:15px}
.search{
display:flex;
gap:10px;
margin-bottom:15px;
}
.search input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:15px;
}
.search button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#00ff99;
font-weight:800;
}
.card{
background:#111827;
padding:16px;
border-radius:16px;
margin-bottom:14px;
box-shadow:0 8px 25px rgba(0,0,0,.35);
}
.team{
display:flex;
align-items:center;
gap:12px;
font-size:18px;
font-weight:800;
}
.team img{
width:42px;
height:42px;
object-fit:contain;
background:#fff;
border-radius:50%;
padding:4px;
}
.small{
font-size:13px;
color:#b7c1df;
margin-top:8px;
}
.pred{
margin-top:12px;
padding:10px;
border-radius:10px;
background:#0d2b1c;
color:#00ff99;
font-weight:800;
}
.ad{
background:#1d2232;
padding:16px;
border-radius:16px;
text-align:center;
margin:14px 0;
color:#ccc;
}
.loading{
text-align:center;
padding:30px;
color:#00ff99;
font-weight:bold;
}
</style>
</head>
<body>

<header>BetMindPro Live</header>

<div class="wrap">

<div class="search">
<input type="text" id="teamInput" placeholder="Search team e.g Arsenal">
<button onclick="searchTeam()">Search</button>
</div>

<div class="ad">📢 Sponsored Ad Space</div>

<div id="results" class="loading">Loading trending teams...</div>

</div>

<script>
const API = "https://www.thesportsdb.com/api/v1/json/123/";

async function loadTrending(){
document.getElementById("results").innerHTML = "Loading trending teams...";
let teams = ["Arsenal","Chelsea","Barcelona","Real Madrid","Man United"];
let html = "";

for(let t of teams){
let res = await fetch(API + "searchteams.php?t=" + encodeURIComponent(t));
let data = await res.json();

if(data.teams && data.teams[0]){
let team = data.teams[0];

html += `
<div class="card">
<div class="team">
<img src="${team.strTeamBadge}">
<div>${team.strTeam}</div>
</div>
<div class="small">${team.strLeague}</div>
<div class="small">${team.strCountry}</div>
<div class="pred">AI Pick: Strong Team Form Today 🔥</div>
</div>
`;
}
}

document.getElementById("results").innerHTML = html;
}

async function searchTeam(){
let query = document.getElementById("teamInput").value.trim();

if(!query) return;

document.getElementById("results").innerHTML = "Searching...";

let res = await fetch(API + "searchteams.php?t=" + encodeURIComponent(query));
let data = await res.json();

if(!data.teams){
document.getElementById("results").innerHTML = "No team found.";
return;
}

let html = "";

data.teams.forEach(team=>{
html += `
<div class="card">
<div class="team">
<img src="${team.strTeamBadge}">
<div>${team.strTeam}</div>
</div>
<div class="small">${team.strLeague}</div>
<div class="small">${team.strCountry}</div>
<div class="pred">AI Pick: Watch Odds Movement 📈</div>
</div>
`;
});

document.getElementById("results").innerHTML = html;
}

loadTrending();
</script>

</body>
</html>
