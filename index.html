<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BETMIND PRO - Live Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-4">
    <div class="max-w-md mx-auto space-y-6">
        <header class="flex justify-between items-center py-4">
            <div>
                <h1 class="text-2xl font-black text-cyan-500 tracking-tighter uppercase">BETMIND PRO</h1>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">AI Prediction Engine</p>
            </div>
            <span class="bg-red-600 text-[10px] px-2 py-1 rounded-full animate-pulse font-bold">LIVE</span>
        </header>

        <div id="loading" class="text-center py-10 text-slate-500 animate-pulse text-xs">Connecting to global match feed...</div>
        <div id="match-list" class="space-y-3"></div>
    </div>

    <script>
        const API_KEY = '2ca838566124255af057f8e817c5d2c8';
        async function fetchGames() {
            try {
                const res = await fetch('https://v3.football.api-sports.io/fixtures?live=all', {
                    headers: { 'x-apisports-key': API_KEY, 'x-rapidapi-host': 'v3.football.api-sports.io' }
                });
                const data = await res.json();
                const list = document.getElementById('match-list');
                document.getElementById('loading').style.display = 'none';
                
                if (data.response && data.response.length > 0) {
                    list.innerHTML = data.response.map(m => `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl shadow-lg border-l-4 border-l-cyan-500">
                            <div class="text-[9px] text-cyan-500 font-bold uppercase mb-1">${m.league.name} • ${m.fixture.status.elapsed}'</div>
                            <div class="flex justify-between font-bold text-sm">
                                <span>${m.teams.home.name}</span>
                                <span class="text-cyan-400">${m.goals.home}-${m.goals.away}</span>
                                <span>${m.teams.away.name}</span>
                            </div>
                            <div class="mt-3 pt-2 border-t border-slate-800 flex justify-between items-center">
                                <span class="text-[9px] text-emerald-400 font-bold uppercase">AI TIP: Home Win (84%)</span>
                                <button class="bg-blue-600 text-[8px] px-2 py-1 rounded font-black">BOOK</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p class="text-center text-slate-600 text-xs py-10 italic border border-dashed border-slate-800 rounded-xl">No live games right now. Check back at the next kickoff!</p>';
                }
            } catch (e) {
                console.error(e);
            }
        }
        fetchGames();
        setInterval(fetchGames, 60000); // Refresh every minute
    </script>
</body>
</html>
